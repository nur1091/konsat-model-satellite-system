name: Validate design

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt
        
      - name: Regenerate RF analysis
        run: python analysis/generate_link_budget.py

      - name: Regenerate telemetry demonstration
        run: python demo/generate_telemetry_demo.py

      - name: Validate repository evidence
        run: python analysis/validate_repository.py

      - name: Verify generated data are committed
        run: git diff --exit-code -- data/link_budget_profile.csv data/sample_telemetry.csv results/link_budget_summary.json results/telemetry_demo_summary.json
